* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--deep);
  color: var(--cloud);
  font-family: 'Josefin Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* 背景の星 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(circle at 20% 30%, rgba(168,216,240,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(255,209,102,0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.stars {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: twinkle var(--dur) infinite var(--delay) ease-in-out;
}

@keyframes twinkle {
  0%, 100% { opacity: 0; }
  50% { opacity: var(--op); }
}

header {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 48px 24px 24px;
}

header h1 {
  font-family: 'Josefin Sans', sans-serif;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 300;
  letter-spacing: 0.3em;
  color: var(--sky);
  text-shadow: var(--glow);
}

header h1 span {
  color: var(--accent);
  font-weight: 600;
}

header p {
  margin-top: 10px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.95rem;
  color: rgba(168,216,240,0.7);
  letter-spacing: 0.05em;
}

.container {
  position: relative;
  z-index: 10;
  max-width: 860px;
  margin: 0 auto;
  padding: 0 20px 80px;
}

/* アップロードゾーン */
.upload-zone {
  border: 2px dashed rgba(168,216,240,0.4);
  border-radius: 20px;
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  background: rgba(168,216,240,0.04);
  position: relative;
  overflow: hidden;
}

.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--sky);
  background: rgba(168,216,240,0.08);
  box-shadow: var(--glow);
}

.upload-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

.upload-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  display: block;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.upload-zone h2 {
  font-weight: 300;
  font-size: 1.2rem;
  letter-spacing: 0.15em;
  color: var(--sky);
}

.upload-zone p {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.85rem;
  color: rgba(255,255,255,0.4);
  margin-top: 8px;
}

#file-name {
  margin-top: 12px;
  font-size: 0.85rem;
  color: var(--accent);
  font-family: 'Zen Maru Gothic', sans-serif;
}

/* オプション */
.options {
  display: flex;
  gap: 12px;
  margin: 20px 0;
  flex-wrap: wrap;
}

.option-chip {
  flex: 1;
  min-width: 120px;
  padding: 12px 16px;
  background: rgba(168,216,240,0.07);
  border: 1px solid rgba(168,216,240,0.2);
  border-radius: 12px;
  color: var(--cloud);
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.option-chip.active {
  background: rgba(168,216,240,0.2);
  border-color: var(--sky);
  color: var(--sky);
  box-shadow: 0 0 10px rgba(168,216,240,0.2);
}

/* 生成ボタン */
.btn-generate {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, rgba(168,216,240,0.2), rgba(255,209,102,0.15));
  border: 1px solid rgba(168,216,240,0.5);
  border-radius: 14px;
  color: var(--sky);
  font-family: 'Josefin Sans', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.25em;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.btn-generate:hover:not(:disabled) {
  background: linear-gradient(135deg, rgba(168,216,240,0.3), rgba(255,209,102,0.25));
  box-shadow: var(--glow);
  transform: translateY(-1px);
}

.btn-generate:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ローディング */
.loading {
  display: none;
  text-align: center;
  padding: 40px;
}

.loading.visible { display: block; }

.loading-orb {
  width: 60px;
  height: 60px;
  border: 3px solid rgba(168,216,240,0.2);
  border-top-color: var(--sky);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading p {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.9rem;
  color: rgba(168,216,240,0.7);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* 結果エリア */
.result {
  display: none;
  margin-top: 32px;
}

.result.visible { display: block; }

.result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.result-header h2 {
  font-weight: 300;
  font-size: 1.3rem;
  letter-spacing: 0.15em;
  color: var(--sky);
}

.btn-copy {
  padding: 8px 20px;
  background: rgba(255,209,102,0.15);
  border: 1px solid rgba(255,209,102,0.4);
  border-radius: 8px;
  color: var(--accent);
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-copy:hover {
  background: rgba(255,209,102,0.25);
}

/* メロディ情報 */
.melody-info {
  background: rgba(168,216,240,0.05);
  border: 1px solid rgba(168,216,240,0.15);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 24px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.9rem;
  line-height: 1.8;
  color: rgba(255,255,255,0.75);
}

.melody-info strong {
  color: var(--sky);
}

/* Sky楽譜 */
.sky-score {
  background: rgba(10,18,35,0.6);
  border: 1px solid rgba(168,216,240,0.15);
  border-radius: 16px;
  padding: 24px;
  overflow-x: auto;
}

.score-title {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.8rem;
  color: rgba(168,216,240,0.5);
  letter-spacing: 0.1em;
  margin-bottom: 20px;
  text-transform: uppercase;
}

/* 鍵盤グリッド（Sky形式） */
.sky-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.beat-group {
  display: flex;
  align-items: center;
  gap: 10px;
}

.beat-label {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.7rem;
  color: rgba(168,216,240,0.35);
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}

.beat-keys {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}

.key-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  border-radius: 8px;
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  border: none;
  cursor: default;
  transition: all 0.15s;
  position: relative;
}

.key-btn.white-key {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.3);
}

.key-btn.black-key {
  background: rgba(58,80,107,0.5);
  border: 1px solid rgba(58,80,107,0.8);
  color: rgba(255,255,255,0.2);
}

.key-btn.active-melody {
  background: linear-gradient(135deg, var(--accent), #ffaa00);
  border: none;
  color: #1a2b4a;
  box-shadow: 0 0 16px rgba(255,209,102,0.6), 0 4px 8px rgba(0,0,0,0.4);
  transform: scale(1.08);
  z-index: 2;
}

.key-btn.active-chord {
  background: linear-gradient(135deg, var(--sky), #5ba4c8);
  border: none;
  color: #1a2b4a;
  box-shadow: 0 0 12px rgba(168,216,240,0.5), 0 4px 8px rgba(0,0,0,0.3);
  transform: scale(1.05);
  z-index: 1;
}

.rest-marker {
  width: 44px;
  height: 44px;
  border-radius: 8px;
  background: rgba(255,255,255,0.03);
  border: 1px dashed rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  color: rgba(255,255,255,0.15);
}

/* 凡例 */
.legend {
  display: flex;
  gap: 20px;
  margin-top: 16px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.75rem;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;

.legend-dot {
  width: 14px;
  height: 14px;

}

.legend-dot.melody { background: var(--accent); }
.legend-dot.chord { background: var(--sky); }

/* テキスト出力 */
.text-output {
  margin-top: 20px;
  background: rgba(10,18,35,0.8);
  border: 1px solid rgba(168,216,240,0.1);
  border-radius: 12px;
  padding: 16px 20px;
}

.text-output h3 {
  font-size: 0.75rem;

  color: rgba(168,216,240,0.4);
  margin-bottom: 12px;
}

.text-output pre {
  font-family: 'Courier New', monospace;

  color: rgba(255,255,255,0.65);

/* エラー */
.error {
  display: none;
  background: rgba(255,80,80,0.1);
  border: 1px solid rgba(255,80,80,0.3);
  border-radius: 12px;

  font-family: 'Zen Maru Gothic', sans-serif;

.error.visible { display: block; }

.server-config label {

}

<script>
// ======== 定数 ========
const NOTE_MAP = {
  'C':  '1',  'C#': '1#', 'Db': '1#',
  'D':  '2',  'D#': '2#', 'Eb': '2#',
  'E':  '3',
  'F':  '4',  'F#': '4#', 'Gb': '4#',
  'G':  '5',  'G#': '5#', 'Ab': '5#',
  'A':  '6',  'A#': '6#', 'Bb': '6#',
  'B':  '7'
};

const OCTAVE_PREFIX = ['', "'", "''"];

const ALL_KEYS = [
  {note:'C',type:'white'},{note:'C#',type:'black'},
  {note:'D',type:'white'},{note:'D#',type:'black'},
  {note:'E',type:'white'},
  {note:'F',type:'white'},{note:'F#',type:'black'},
  {note:'G',type:'white'},{note:'G#',type:'black'},
  {note:'A',type:'white'},{note:'A#',type:'black'},
  {note:'B',type:'white'},
];

// ======== 状態 ========
let selectedMode = 'simple';
let selectedTempo = 'normal';
let selectedFile = null;

// ======== 星生成 ========
(function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --dur:${2+Math.random()*4}s;
      --delay:${Math.random()*4}s;
      --op:${0.2+Math.random()*0.7};
    `;
    container.appendChild(star);
  }
})();

// ======== ファイル選択 ========
const fileInput = document.getElementById('file-input');
const uploadZone = document.getElementById('upload-zone');

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) {
    selectedFile = e.target.files[0];
    document.getElementById('file-name').textContent = '📁 ' + selectedFile.name;
  }
});

uploadZone.addEventListener('dragover', e => {
  e.preventDefault();
  uploadZone.classList.add('drag-over');
});

uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));

uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('audio/')) {
    selectedFile = f;
    document.getElementById('file-name').textContent = '📁 ' + f.name;
  }
});

// ======== モード選択 ========
function selectMode(el) {
  document.querySelectorAll('[data-mode]').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  selectedMode = el.dataset.mode;
}

function selectTempo(el) {
  document.querySelectorAll('[data-tempo]').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  selectedTempo = el.dataset.tempo;
}

// ======== 生成 ========
async function generate() {
  if (!selectedFile) { showError('音楽ファイルを選択してください'); return; }

  const serverUrl = document.getElementById('server-url').value.trim();
  if (!serverUrl) { showError('PHPサーバーURLを入力してください'); return; }

  // UI切替
  document.getElementById('btn-generate').disabled = true;
  document.getElementById('loading').classList.add('visible');
  document.getElementById('result').classList.remove('visible');
  document.getElementById('error').classList.remove('visible');

  const loadingMsgs = [
    'AIが音楽を解析しています...',
    'メロディを抽出中...',
    'Sky楽譜を生成中...',
    'もう少しで完成...'
  ];
  let mi = 0;
  const msgEl = document.getElementById('loading-msg');
  const msgTimer = setInterval(() => {
    mi = (mi + 1) % loadingMsgs.length;
    msgEl.textContent = loadingMsgs[mi];
  }, 2000);

  try {
    const formData = new FormData();
    formData.append('audio', selectedFile);
    formData.append('mode', selectedMode);
    formData.append('tempo', selectedTempo);

    const resp = await fetch(serverUrl, { method: 'POST', body: formData });
    if (!resp.ok) throw new Error('サーバーエラー: ' + resp.status);

    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    renderResult(data);

  } catch(e) {
    showError(e.message || '不明なエラーが発生しました');
  } finally {
    clearInterval(msgTimer);
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('btn-generate').disabled = false;
  }
}

// ======== 結果レンダリング ========
function renderResult(data) {
  // メロディ情報
  const info = data.info || {};
  document.getElementById('melody-info').innerHTML = `
    <strong>曲名:</strong> ${info.title || selectedFile.name} ／
    <strong>キー:</strong> ${info.key || '-'} ／
    <strong>テンポ:</strong> ${info.bpm || '-'} BPM ／
    <strong>拍子:</strong> ${info.timeSignature || '4/4'}<br>
    <strong>AI解説:</strong> ${info.description || ''}
  `;

  // Sky楽譜グリッド
  const beats = data.beats || [];
  const grid = document.getElementById('sky-grid');
  grid.innerHTML = '';

  beats.forEach((beat, i) => {
    const row = document.createElement('div');
    row.className = 'beat-group';

    const lbl = document.createElement('div');
    lbl.className = 'beat-label';
    lbl.textContent = i + 1;
    row.appendChild(lbl);

    const keys = document.createElement('div');
    keys.className = 'beat-keys';

    // 3オクターブ分の鍵盤を表示
    for (let oct = 0; oct < 3; oct++) {
      ALL_KEYS.forEach(k => {
        const noteId = k.note + (oct + 1); // C1, C#1, ... B3
        const btn = document.createElement('div');
        btn.className = `key-btn ${k.type === 'white' ? 'white-key' : 'black-key'}`;

        const skyNum = NOTE_MAP[k.note] + OCTAVE_PREFIX[oct];
        btn.textContent = skyNum;
        btn.title = k.note + (oct+1);

        const isM = beat.melody && beat.melody.includes(noteId);
        const isC = beat.chord && beat.chord.includes(noteId);

        if (isM) btn.classList.add('active-melody');
        else if (isC) btn.classList.add('active-chord');

        keys.appendChild(btn);
      });

      // オクターブ区切り
      if (oct < 2) {
        const sep = document.createElement('div');
        sep.style.cssText = 'width:2px;height:44px;background:rgba(168,216,240,0.15);border-radius:1px;flex-shrink:0;';
        keys.appendChild(sep);
      }
    }

    row.appendChild(keys);
    grid.appendChild(row);
  });

  // テキスト出力
  document.getElementById('text-output').textContent = data.textScore || '';

  document.getElementById('result').classList.add('visible');
  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ======== コピー ========
function copyText() {
  const text = document.getElementById('text-output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = 'コピー完了！';
    setTimeout(() => btn.textContent = 'テキストをコピー', 2000);
  });
}

// ======== エラー ========
function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = '⚠ ' + msg;
  el.classList.add('visible');
}
</script>

</body>
</html>
