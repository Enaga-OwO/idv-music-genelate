<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky Sheet Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --sky: #a8d8f0;
      --deep: #1a2b4a;
      --cloud: #f0f7ff;
      --accent: #ffd166;
      --glow: 0 0 16px rgba(168,216,240,0.6);
    }

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--deep);
  color: var(--cloud);
  font-family: 'Josefin Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(168,216,240,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(255,209,102,0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

.star {
  position: absolute;
  width: 2px; height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: twinkle var(--dur) infinite var(--delay) ease-in-out;
}

@keyframes twinkle {
  0%, 100% { opacity: 0; }
  50% { opacity: var(--op); }
}

header {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 48px 24px 24px;
}

header h1 {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 300;
  letter-spacing: 0.3em;
  color: var(--sky);
  text-shadow: var(--glow);
}

header h1 span { color: var(--accent); font-weight: 600; }

header p {
  margin-top: 10px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.95rem;
  color: rgba(168,216,240,0.7);
  letter-spacing: 0.05em;
}

.container {
  position: relative;
  z-index: 10;
  max-width: 860px;
  margin: 0 auto;
  padding: 0 20px 80px;
}

.upload-zone {
  border: 2px dashed rgba(168,216,240,0.4);
  border-radius: 20px;
  padding: 48px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  background: rgba(168,216,240,0.04);
  position: relative;
  overflow: hidden;
}

.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--sky);
  background: rgba(168,216,240,0.08);
  box-shadow: var(--glow);
}

.upload-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

.upload-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  display: block;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.upload-zone h2 {
  font-weight: 300;
  font-size: 1.2rem;
  letter-spacing: 0.15em;
  color: var(--sky);
}

.upload-zone p {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.85rem;
  color: rgba(255,255,255,0.4);
  margin-top: 8px;
}

#file-name {
  margin-top: 12px;
  font-size: 0.85rem;
  color: var(--accent);
  font-family: 'Zen Maru Gothic', sans-serif;
}

.options {
  display: flex;
  gap: 12px;
  margin: 20px 0;
  flex-wrap: wrap;
}

.option-chip {
  flex: 1;
  min-width: 120px;
  padding: 12px 16px;
  background: rgba(168,216,240,0.07);
  border: 1px solid rgba(168,216,240,0.2);
  border-radius: 12px;
  color: var(--cloud);
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.option-chip.active {
  background: rgba(168,216,240,0.2);
  border-color: var(--sky);
  color: var(--sky);
  box-shadow: 0 0 10px rgba(168,216,240,0.2);
}

.btn-generate {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, rgba(168,216,240,0.2), rgba(255,209,102,0.15));
  border: 1px solid rgba(168,216,240,0.5);
  border-radius: 14px;
  color: var(--sky);
  font-family: 'Josefin Sans', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.25em;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-generate:hover:not(:disabled) {
  background: linear-gradient(135deg, rgba(168,216,240,0.3), rgba(255,209,102,0.25));
  box-shadow: var(--glow);
  transform: translateY(-1px);
}

.btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

.loading { display: none; text-align: center; padding: 40px; }
.loading.visible { display: block; }

.loading-orb {
  width: 60px; height: 60px;
  border: 3px solid rgba(168,216,240,0.2);
  border-top-color: var(--sky);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading p {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.9rem;
  color: rgba(168,216,240,0.7);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.result { display: none; margin-top: 32px; }
.result.visible { display: block; }

.result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.result-header h2 {
  font-weight: 300;
  font-size: 1.3rem;
  letter-spacing: 0.15em;
  color: var(--sky);
}

.btn-copy {
  padding: 8px 20px;
  background: rgba(255,209,102,0.15);
  border: 1px solid rgba(255,209,102,0.4);
  border-radius: 8px;
  color: var(--accent);
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-copy:hover { background: rgba(255,209,102,0.25); }

.melody-info {
  background: rgba(168,216,240,0.05);
  border: 1px solid rgba(168,216,240,0.15);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 24px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.9rem;
  line-height: 1.8;
  color: rgba(255,255,255,0.75);
}

.melody-info strong { color: var(--sky); }

.sky-score {
  background: rgba(10,18,35,0.6);
  border: 1px solid rgba(168,216,240,0.15);
  border-radius: 16px;
  padding: 24px;
  overflow-x: auto;
}

.score-title {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.8rem;
  color: rgba(168,216,240,0.5);
  letter-spacing: 0.1em;
  margin-bottom: 20px;
}

.sky-grid { display: flex; flex-direction: column; gap: 8px; }

.beat-group { display: flex; align-items: center; gap: 10px; }

.beat-label {
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.7rem;
  color: rgba(168,216,240,0.35);
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}

.beat-keys { display: flex; gap: 5px; flex-wrap: wrap; }

.key-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px; height: 44px;
  border-radius: 8px;
  font-family: 'Josefin Sans', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  border: none;
  cursor: default;
  transition: all 0.15s;
}

.key-btn.white-key {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.3);
}

.key-btn.black-key {
  background: rgba(58,80,107,0.5);
  border: 1px solid rgba(58,80,107,0.8);
  color: rgba(255,255,255,0.2);
}

.key-btn.active-melody {
  background: linear-gradient(135deg, var(--accent), #ffaa00);
  color: #1a2b4a;
  box-shadow: 0 0 16px rgba(255,209,102,0.6), 0 4px 8px rgba(0,0,0,0.4);
  transform: scale(1.08);
  z-index: 2;
}

.key-btn.active-chord {
  background: linear-gradient(135deg, var(--sky), #5ba4c8);
  color: #1a2b4a;
  box-shadow: 0 0 12px rgba(168,216,240,0.5), 0 4px 8px rgba(0,0,0,0.3);
  transform: scale(1.05);
  z-index: 1;
}

.legend {
  display: flex;
  gap: 20px;
  margin-top: 16px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.75rem;
}

.legend-item { display: flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.4); }

.legend-dot { width: 14px; height: 14px; border-radius: 3px; }
.legend-dot.melody { background: var(--accent); }
.legend-dot.chord { background: var(--sky); }

.text-output {
  margin-top: 20px;
  background: rgba(10,18,35,0.8);
  border: 1px solid rgba(168,216,240,0.1);
  border-radius: 12px;
  padding: 16px 20px;
}

.text-output h3 {
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  color: rgba(168,216,240,0.4);
  margin-bottom: 12px;
}

.text-output pre {
  font-family: 'Courier New', monospace;
  font-size: 0.85rem;
  color: rgba(255,255,255,0.65);
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.9;
}

.error {
  display: none;
  background: rgba(255,80,80,0.1);
  border: 1px solid rgba(255,80,80,0.3);
  border-radius: 12px;
  padding: 16px 20px;
  color: #ff9999;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.9rem;
  margin-top: 20px;
}

.error.visible { display: block; }

.divider {
  border: none;
  border-top: 1px solid rgba(168,216,240,0.1);
  margin: 28px 0;
}

  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <h1>SKY <span>SHEET</span></h1>
  <p>AIが音楽を解析して、Sky楽譜を生成します</p>
</header>

<div class="container">

  <!-- PHPサーバーURL（非表示） -->

  <div style="display:none;">
    <input type="url" id="server-url" value="https://data.kt69.f5.si/idv-music-generate/sky-api.php">
  </div>

  <!-- アップロードゾーン -->

  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" accept="audio/*,.mp3,.wav,.ogg,.m4a,.flac">
    <span class="upload-icon">🎵</span>
    <h2>UPLOAD MUSIC</h2>
    <p>MP3, WAV, OGG, M4A, FLAC対応 · ドラッグ&amp;ドロップでも可</p>
    <div id="file-name"></div>
  </div>

  <!-- オプション -->

  <div class="options" style="margin-top:16px;">
    <div class="option-chip active" data-mode="simple" onclick="selectMode(this)">シンプル（1声）</div>
    <div class="option-chip" data-mode="chord" onclick="selectMode(this)">コード付き</div>
    <div class="option-chip" data-mode="full" onclick="selectMode(this)">フルアレンジ</div>
  </div>

  <div class="options">
    <div class="option-chip active" data-tempo="normal" onclick="selectTempo(this)">普通</div>
    <div class="option-chip" data-tempo="slow" onclick="selectTempo(this)">ゆっくり</div>
    <div class="option-chip" data-tempo="fast" onclick="selectTempo(this)">速め</div>
  </div>

  <button class="btn-generate" id="btn-generate" onclick="generate()">
    ✦ GENERATE SKY SHEET ✦
  </button>

  <!-- ローディング -->

  <div class="loading" id="loading">
    <div class="loading-orb"></div>
    <p id="loading-msg">AIが音楽を解析しています...</p>
  </div>

  <!-- エラー -->

  <div class="error" id="error"></div>

  <!-- 結果 -->

  <div class="result" id="result">
    <hr class="divider">
    <div class="result-header">
      <h2>✦ GENERATED SHEET</h2>
      <button class="btn-copy" onclick="copyText()">テキストをコピー</button>
    </div>
<div class="melody-info" id="melody-info"></div>

<div class="sky-score">
  <div class="score-title">Sky楽譜 — 黄色: メロディ ／ 青: 伴奏</div>
  <div class="sky-grid" id="sky-grid"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot melody"></div><span>メロディ</span></div>
    <div class="legend-item"><div class="legend-dot chord"></div><span>伴奏/コード</span></div>
  </div>
</div>

<div class="text-output">
  <h3>TEXT FORMAT</h3>
  <pre id="text-output"></pre>
</div>

  </div>

</div>

<script>
var NOTE_MAP = {
  'C':'1', 'C#':'1#', 'Db':'1#',
  'D':'2', 'D#':'2#', 'Eb':'2#',
  'E':'3',
  'F':'4', 'F#':'4#', 'Gb':'4#',
  'G':'5', 'G#':'5#', 'Ab':'5#',
  'A':'6', 'A#':'6#', 'Bb':'6#',
  'B':'7'
};

var OCTAVE_PREFIX = ['', "'", "''"];

var ALL_KEYS = [
  {note:'C',type:'white'},{note:'C#',type:'black'},
  {note:'D',type:'white'},{note:'D#',type:'black'},
  {note:'E',type:'white'},
  {note:'F',type:'white'},{note:'F#',type:'black'},
  {note:'G',type:'white'},{note:'G#',type:'black'},
  {note:'A',type:'white'},{note:'A#',type:'black'},
  {note:'B',type:'white'}
];

var selectedMode = 'simple';
var selectedTempo = 'normal';
var selectedFile = null;

(function createStars() {
  var container = document.getElementById('stars');
  for (var i = 0; i < 80; i++) {
    var star = document.createElement('div');
    star.className = 'star';
    star.style.cssText =
      'left:' + (Math.random()*100) + '%;' +
      'top:' + (Math.random()*100) + '%;' +
      '--dur:' + (2+Math.random()*4) + 's;' +
      '--delay:' + (Math.random()*4) + 's;' +
      '--op:' + (0.2+Math.random()*0.7) + ';';
    container.appendChild(star);
  }
})();

var fileInput = document.getElementById('file-input');
var uploadZone = document.getElementById('upload-zone');

fileInput.addEventListener('change', function(e) {
  if (e.target.files[0]) {
    selectedFile = e.target.files[0];
    document.getElementById('file-name').textContent = '📁 ' + selectedFile.name;
  }
});

uploadZone.addEventListener('dragover', function(e) {
  e.preventDefault();
  uploadZone.classList.add('drag-over');
});

uploadZone.addEventListener('dragleave', function() {
  uploadZone.classList.remove('drag-over');
});

uploadZone.addEventListener('drop', function(e) {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  var f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('audio/')) {
    selectedFile = f;
    document.getElementById('file-name').textContent = '📁 ' + f.name;
  }
});

function selectMode(el) {
  document.querySelectorAll('[data-mode]').forEach(function(e) { e.classList.remove('active'); });
  el.classList.add('active');
  selectedMode = el.dataset.mode;
}

function selectTempo(el) {
  document.querySelectorAll('[data-tempo]').forEach(function(e) { e.classList.remove('active'); });
  el.classList.add('active');
  selectedTempo = el.dataset.tempo;
}

async function generate() {
  if (!selectedFile) { showError('音楽ファイルを選択してください'); return; }

  var serverUrl = document.getElementById('server-url').value.trim();
  if (!serverUrl) { showError('PHPサーバーURLが設定されていません'); return; }

  document.getElementById('btn-generate').disabled = true;
  document.getElementById('loading').classList.add('visible');
  document.getElementById('result').classList.remove('visible');
  document.getElementById('error').classList.remove('visible');

  var loadingMsgs = [
    'AIが音楽を解析しています...',
    'メロディを抽出中...',
    'Sky楽譜を生成中...',
    'もう少しで完成...'
  ];
  var mi = 0;
  var msgEl = document.getElementById('loading-msg');
  var msgTimer = setInterval(function() {
    mi = (mi + 1) % loadingMsgs.length;
    msgEl.textContent = loadingMsgs[mi];
  }, 2000);

  try {
    var formData = new FormData();
    formData.append('audio', selectedFile);
    formData.append('mode', selectedMode);
    formData.append('tempo', selectedTempo);

    var resp;
    try {
      resp = await fetch(serverUrl, { method: 'POST', body: formData });
    } catch(fetchErr) {
      throw new Error('ネットワークエラー（CORSの可能性）: ' + fetchErr.message + ' / URL: ' + serverUrl);
    }

    if (!resp.ok) {
      var errText = '';
      try { errText = await resp.text(); } catch(e2) {}
      throw new Error('サーバーエラー HTTP ' + resp.status + ' / ' + errText.slice(0, 300));
    }

    var data;
    try {
      data = await resp.json();
    } catch(jsonErr) {
      throw new Error('JSONパースエラー: ' + jsonErr.message);
    }

    if (data.error) throw new Error(data.error);

    renderResult(data);

  } catch(e) {
    showError(e.message || '不明なエラーが発生しました');
  } finally {
    clearInterval(msgTimer);
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('btn-generate').disabled = false;
  }
}

function renderResult(data) {
  var info = data.info || {};
  document.getElementById('melody-info').innerHTML =
    '<strong>曲名:</strong> ' + (info.title || selectedFile.name) + ' ／ ' +
    '<strong>キー:</strong> ' + (info.key || '-') + ' ／ ' +
    '<strong>テンポ:</strong> ' + (info.bpm || '-') + ' BPM ／ ' +
    '<strong>拍子:</strong> ' + (info.timeSignature || '4/4') + '<br>' +
    '<strong>AI解説:</strong> ' + (info.description || '');

  var beats = data.beats || [];
  var grid = document.getElementById('sky-grid');
  grid.innerHTML = '';

  beats.forEach(function(beat, i) {
    var row = document.createElement('div');
    row.className = 'beat-group';

    var lbl = document.createElement('div');
    lbl.className = 'beat-label';
    lbl.textContent = i + 1;
    row.appendChild(lbl);

    var keys = document.createElement('div');
    keys.className = 'beat-keys';

    for (var oct = 0; oct < 3; oct++) {
      ALL_KEYS.forEach(function(k) {
        var noteId = k.note + (oct + 1);
        var btn = document.createElement('div');
        btn.className = 'key-btn ' + (k.type === 'white' ? 'white-key' : 'black-key');
        btn.textContent = NOTE_MAP[k.note] + OCTAVE_PREFIX[oct];
        btn.title = k.note + (oct+1);

        var isM = beat.melody && beat.melody.includes(noteId);
        var isC = beat.chord && beat.chord.includes(noteId);
        if (isM) btn.classList.add('active-melody');
        else if (isC) btn.classList.add('active-chord');

        keys.appendChild(btn);
      });

      if (oct < 2) {
        var sep = document.createElement('div');
        sep.style.cssText = 'width:2px;height:44px;background:rgba(168,216,240,0.15);border-radius:1px;flex-shrink:0;';
        keys.appendChild(sep);
      }
    }

    row.appendChild(keys);
    grid.appendChild(row);
  });

  document.getElementById('text-output').textContent = data.textScore || '';
  document.getElementById('result').classList.add('visible');
  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyText() {
  var text = document.getElementById('text-output').textContent;
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.querySelector('.btn-copy');
    btn.textContent = 'コピー完了！';
    setTimeout(function() { btn.textContent = 'テキストをコピー'; }, 2000);
  });
}

function showError(msg) {
  var el = document.getElementById('error');
  el.textContent = '⚠ ' + msg;
  el.classList.add('visible');
}
</script>

</body>
</html>
